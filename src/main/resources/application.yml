spring:
  application:
    name: nomad-rates-sentinel

  # ============================================
  # АКТИВНЫЙ ПРОФИЛЬ (Render автоматически установит production)
  # ============================================
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:production}

  # ============================================
  # R2DBC КОНФИГУРАЦИЯ (для Reactor)
  # ============================================
  r2dbc:
    url: ${SPRING_R2DBC_URL:${R2DBC_URL:r2dbc:postgresql://localhost:5432/nomad}}
    username: ${SPRING_R2DBC_USERNAME:${DB_USERNAME:admin}}
    password: ${SPRING_R2DBC_PASSWORD:${DB_PASSWORD:qwerty}}
    pool:
      max-size: ${R2DBC_MAX_POOL_SIZE:10}
      initial-size: ${R2DBC_INITIAL_POOL_SIZE:2}
      max-idle-time: 30m
      validation-query: SELECT 1
    properties:
      schema: public
      sslmode: ${DB_SSLMODE:disable}
      applicationName: nomad-rates

  # ============================================
  # JDBC КОНФИГУРАЦИЯ (для Loom и Liquibase)
  # ============================================
  datasource:
    url: ${SPRING_DATASOURCE_URL:${JDBC_URL:jdbc:postgresql://localhost:5432/nomad}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:admin}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:qwerty}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${JDBC_MAX_POOL_SIZE:10}
      minimum-idle: ${JDBC_MIN_IDLE:3}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: NomadHikariPool
      connection-test-query: SELECT 1
      validation-timeout: 3000
      leak-detection-threshold: ${LEAK_DETECTION_THRESHOLD:10000}
      register-mbeans: true

  # ============================================
  # LIQUIBASE КОНФИГУРАЦИЯ
  # ============================================
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    url: ${SPRING_DATASOURCE_URL:${JDBC_URL:jdbc:postgresql://localhost:5432/nomad}}
    user: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:admin}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:qwerty}}
    database-change-log-table: DATABASECHANGELOG
    database-change-log-lock-table: DATABASECHANGELOGLOCK
    drop-first: false
    clear-checksums: false
    parameters:
      schema-name: public
    contexts: ${LIQUIBASE_CONTEXTS:dev,all}
    test-rollback-on-update: false

  # ============================================
  # JPA КОНФИГУРАЦИЯ (для Loom)
  # ============================================
  jpa:
    database: POSTGRESQL
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        format_sql: false
    show-sql: false
    open-in-view: false



# ============================================
# SERVER КОНФИГУРАЦИЯ
# ============================================
server:
  port: ${PORT:8080}
  error:
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  tomcat:
    max-threads: ${TOMCAT_MAX_THREADS:50}
    min-spare-threads: ${TOMCAT_MIN_SPARE:5}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:200}
    accept-count: ${TOMCAT_ACCEPT_COUNT:50}
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:10000}
    max-keep-alive-requests: ${TOMCAT_KEEP_ALIVE:50}

# ============================================
# LOGGING КОНФИГУРАЦИЯ
# ============================================
logging:
  level:
    # Наше приложение
    com.nomad: ${LOG_LEVEL:INFO}

    # Liquibase
    liquibase: ${LOG_LEVEL_LIQUIBASE:INFO}
    liquibase.changelog: ${LOG_LEVEL_LIQUIBASE:INFO}

    # R2DBC
    org.springframework.r2dbc: ${LOG_LEVEL_R2DBC:INFO}
    io.r2dbc.postgresql.QUERY: ${LOG_LEVEL_R2DBC:INFO}
    io.r2dbc.postgresql.PARAM: ${LOG_LEVEL_R2DBC:INFO}

    # JDBC
    org.springframework.jdbc: ${LOG_LEVEL_JDBC:INFO}
    com.zaxxer.hikari: ${LOG_LEVEL_HIKARI:INFO}
    org.springframework.jdbc.core.JdbcTemplate: ${LOG_LEVEL_JDBC:INFO}

    # jOOQ
    org.jooq: ${LOG_LEVEL_JOOQ:INFO}
    org.jooq.tools.LoggerListener: ${LOG_LEVEL_JOOQ:INFO}

    # WebClient
    org.springframework.web.reactive.function.client: ${LOG_LEVEL_WEB:INFO}
    reactor.netty.http.client: ${LOG_LEVEL_WEB:INFO}

    # Web
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}

    # Актуатор
    org.springframework.boot.actuate: ${LOG_LEVEL_ACTUATOR:INFO}

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/nomad-rates.log}
    max-size: ${LOG_MAX_SIZE:100MB}
    max-history: ${LOG_MAX_HISTORY:7}


# ============================================
# НАСТРОЙКИ ПРИЛОЖЕНИЯ
# ============================================
app:
  # Настройки парсеров
  parser:
    nbk:
      url: ${NBK_URL:https://nationalbank.kz/ru/exchangerates/ezhednevnye-oficialnye-rynochnye-kursy-valyut}
      timeout: ${NBK_TIMEOUT:15000}
      user-agent: ${USER_AGENT:Mozilla/5.0 (compatible; NomadRatesBot/2.0)}
    xe:
      url: ${XE_URL:https://www.xe.com/currencyconverter/convert/?Amount=1&From=%s&To=KZT}
      timeout: ${XE_TIMEOUT:15000}
      user-agent: ${USER_AGENT:Mozilla/5.0 (compatible; NomadRatesBot/2.0)}
      max-parallel: ${XE_MAX_PARALLEL:2}
      retry-attempts: ${XE_RETRY_ATTEMPTS:2}
      retry-delay-ms: ${XE_RETRY_DELAY:200}

  # Настройки коллектора
  collector:
    enabled: ${COLLECTOR_ENABLED:true}
    initial-delay: ${COLLECTOR_INITIAL_DELAY:5000}
    fixed-delay: ${COLLECTOR_FIXED_DELAY:3600000}

  # Настройки для Loom
  loom:
    max-pool-size: ${LOOM_MAX_POOL:200}
    connection-semaphore: ${LOOM_SEMAPHORE:18}
    virtual-threads: ${LOOM_VIRTUAL_THREADS:true}

  # Настройки для Reactor
  reactor:
    max-connections: ${REACTOR_MAX_CONNECTIONS:20}
    retry-attempts: ${REACTOR_RETRY_ATTEMPTS:2}
    retry-backoff: ${REACTOR_RETRY_BACKOFF:200}
    bulkhead-size: ${REACTOR_BULKHEAD:20}
    circuit-breaker:
      failure-threshold: ${REACTOR_CB_THRESHOLD:5}
      timeout-ms: ${REACTOR_CB_TIMEOUT:30000}

  # Настройки таймаутов
  timeout:
    collection: ${COLLECTION_TIMEOUT:25}
    delta: ${DELTA_TIMEOUT:3}
    connection: ${CONNECTION_TIMEOUT:5}
    request: ${REQUEST_TIMEOUT:10}

  # Настройки батчей
  batch:
    size: ${BATCH_SIZE:50}

# ============================================
# ПРОДАКШН НАСТРОЙКИ (для Render)
# ============================================
---
spring:
  config:
    activate:
      on-profile: production

  r2dbc:
    url: ${SPRING_R2DBC_URL}  # Берем из переменных окружения Render
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}
    pool:
      max-size: 5
      initial-size: 1
    properties:
      sslmode: require
      ssl: true

  datasource:
    url: ${SPRING_DATASOURCE_URL}  # Берем из переменных окружения Render
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      leak-detection-threshold: 30000
      connection-timeout: 30000

  liquibase:
    url: ${SPRING_DATASOURCE_URL}
    user: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    contexts: prod,all

server:
  tomcat:
    max-threads: 50
    min-spare-threads: 5
    max-connections: 200

logging:
  level:
    com.nomad: INFO
    liquibase: WARN
    org.springframework.r2dbc: WARN
    io.r2dbc.postgresql.QUERY: INFO
    com.zaxxer.hikari: WARN

app:
  parser:
    nbk:
      timeout: 30000
    xe:
      timeout: 30000
      max-parallel: 2
      retry-attempts: 2
  collector:
    fixed-delay: 7200000
  loom:
    max-pool-size: 100
    connection-semaphore: 5
    virtual-threads: true
  reactor:
    max-connections: 10
    retry-attempts: 2
    retry-backoff: 200
    bulkhead-size: 10
  timeout:
    collection: 25
    delta: 3

# ============================================
# ДЕВ НАСТРОЙКИ (для локальной разработки)
# ============================================
---
spring:
  config:
    activate:
      on-profile: dev

  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/nomad}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:qwerty}
    pool:
      max-size: 10
      initial-size: 2
    properties:
      sslmode: disable

  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/nomad}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:qwerty}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      leak-detection-threshold: 10000

  liquibase:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/nomad}
    user: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:qwerty}
    contexts: dev,all

server:
  tomcat:
    max-threads: 200
    min-spare-threads: 10

logging:
  level:
    com.nomad: DEBUG
    io.r2dbc.postgresql.QUERY: DEBUG
    org.jooq.tools.LoggerListener: DEBUG
    org.springframework.web.reactive.function.client: DEBUG

app:
  parser:
    nbk:
      timeout: 15000
    xe:
      timeout: 15000
      max-parallel: 5
  loom:
    max-pool-size: 200
    connection-semaphore: 18
  reactor:
    max-connections: 50
    retry-attempts: 3
    bulkhead-size: 20
  timeout:
    collection: 30
    delta: 5
